<!DOCTYPE html>
    <head>
        <link rel="stylesheet" href="style.css">
        <link rel="script" href="backup.js">
    </head>
    <body>
        <h1 class = "title">Crypt Maker</h1>
        <p>How to use</p>
        <ul>
            <li>Click the textbox in encrypt to begin encryption, or click the decrypt textbox to decrypt text.</li>
            <li>Then click the buttons by the textboxes to initiate encryption or decryption</li>
        </ul>
        <div>
            <h2>Encrypt</h2>
            <textarea id="inputEncryption" placeholder="Text to encrypt here"></textarea>
            <button id="encryptButton">Encrypt</button>
            <textarea id="encryptedWordOutput" placeholder="Encrypted text here" readonly></textarea>
        </div>
        <div>
            <h2>Decrypt</h2>
            <textarea id="inputDecryption" placeholder="Text to decrypt here"></textarea>
            <button id="decryptButton">Decrypt</button>
            <textarea id="decryptedWordOutput" placeholder="Decrypted text here" readonly></textarea>
            <script src="script.js"></script>
        </div>
        <footer>
            <p>This webpage is created by <a href="https://github.com/corruptu77">@corruptu77</a></p>
        </footer>
    </body>
</html>
